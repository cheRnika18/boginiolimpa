<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7 греческих богинь: ведущий и спящий архетипы</title>
    
    <!-- Подключаем красивые шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.3"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- React и ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #FDFBF7; 
            background-image: url('fon.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="text-slate-800 selection:bg-amber-100 overflow-x-hidden min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ИКОНКИ ---
        const Sparkles = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);
        const ArrowRight = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const ShieldAlert = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>);
        const Circle = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>);
        const RotateCcw = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const MessageCircle = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>);
        const Star = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>);
        const Moon = ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>);

        // --- ДАННЫЕ АРХЕТИПОВ ---
        const archetypesData = [
            { 
                id: 'hestia', order: 1, name: 'Гестия', 
                questions: [
                    "Мне лучше всего восстанавливаться в полном одиночестве, без музыки и разговоров.", 
                    "Тишина и отсутствие социальных обязательств это не пустота, а наполненность для меня.",
                    "Мой дом это мое священное пространство, и я очень избирательно впускаю туда других людей."
                ], 
                leadPlus: "Умение быть в покое, не нуждаться во внешних стимулах. Глубинная целостность. Мудрая отстранённость.",
                leadShadow: "Социальная изоляция, избегание отношений, эмоциональная холодность, риск депрессии.",
                sleepShadow: "Непереносимость одиночества, постоянная потребность в занятости и людях, страх тишины.",
                sleepPlus: "Обретение внутренней опоры, способность быть одной без тревоги.",
                recommendation: "Попробуйте 10 минут в день побыть в полной тишине без телефона. Это разбудит Гестию."
            },
            { 
                id: 'athena', order: 2, name: 'Афина', 
                questions: [
                    "Перед любым важным решением я составляю план или просчитываю риски.", 
                    "Эмоции часто мешают трезво оценивать ситуацию, я стараюсь их отключать.",
                    "В конфликтных ситуациях я предпочитаю опираться на факты и логику, а не на чувства."
                ], 
                leadPlus: "Ясность мышления, способность достигать целей, стрессоустойчивость, стратегическое мышление.",
                leadShadow: "Подавление чувств, разрыв с телом, перфекционизм, трудность в доверии.",
                sleepShadow: "Хаотичность, трудность с планированием, импульсивные решения, страх перед логикой.",
                sleepPlus: "Умение включать голову в кризисной ситуации, просчитывать последствия.",
                recommendation: "Попробуйте составить четкий план на день и следовать ему. Это разбудит Афину."
            },
            { 
                id: 'aphrodite', order: 3, name: 'Афродита', 
                questions: [
                    "Мне жизненно необходимы моменты вдохновения, флирта или творческого подъёма.", 
                    "Если в отношениях пропадает страсть и красивые жесты, я чувствую себя умирающей.",
                    "Я часто влюбляюсь в новые идеи, проекты или людей, отдаваясь этому чувству целиком."
                ], 
                leadPlus: "Живость, привлекательность, творческая энергия, умение радоваться и вдохновлять.",
                leadShadow: "Зависимость от внешнего подтверждения, склонность к драмам, нестабильность, размывание границ.",
                sleepShadow: "Обесцвеченность жизни, отсутствие страсти, страх перед спонтанностью, избегание радости.",
                sleepPlus: "Возвращение вкуса к жизни, телесной чувствительности, красоты в простом.",
                recommendation: "Позвольте себе спонтанную покупку или красивый ритуал ухода за телом. Это разбудит Афродиту."
            },
            { 
                id: 'hera', order: 4, name: 'Гера', 
                questions: [
                    "Для меня очень важно быть официальной женой или партнёршей, это определяет мою ценность.", 
                    "Ревность это естественный сигнал, и я не стесняюсь её проявлять, если есть угроза союзу.",
                    "Мне сложно представить полноценную и счастливую жизнь без надежного партнера рядом."
                ], 
                leadPlus: "Преданность, умение строить долгий союз, церемониальность, статусность.",
                leadShadow: "Ревность, мстительность, потеря себя в партнёре, обесценивание других ролей.",
                sleepShadow: "Неумение хранить верность, страх обязательств, избегание публичного признания союза.",
                sleepPlus: "Способность к глубокой привязанности, доверие в паре.",
                recommendation: "Сделайте что-то символическое для укрепления важных для вас отношений. Это разбудит Геру."
            },
            { 
                id: 'demeter', order: 5, name: 'Деметра', 
                questions: [
                    "Я часто забываю о себе, когда нужно позаботиться о других (семья, друзья, питомцы).", 
                    "Мне трудно пройти мимо чужой беды или нужды, я обязательно вмешаюсь и помогу.",
                    "Я чувствую свою значимость, когда могу накормить, обогреть или поддержать близких."
                ], 
                leadPlus: "Щедрость, заботливость, способность выхаживать, материнская сила.",
                leadShadow: "Контроль через заботу, виктимизация (спасение тех, кто не просит), выгорание.",
                sleepShadow: "Нежелание заботиться о других, эгоцентризм, отвержение своей материнской части.",
                sleepPlus: "Принятие своей потребности заботиться и получать заботу.",
                recommendation: "Позаботьтесь о ком-то бескорыстно или позвольте кому-то позаботиться о вас. Это разбудит Деметру."
            },
            { 
                id: 'persephone', order: 6, name: 'Персефона', 
                questions: [
                    "В трудной ситуации я часто чувствую себя беспомощной и жду, что кто-то придёт и решит всё за меня.", 
                    "Мне свойственно подолгу пребывать в грусти или мечтах, избегая активных действий.",
                    "Я часто подстраиваюсь под желания окружающих, чтобы не создавать напряжения и конфликтов."
                ], 
                leadPlus: "Чувствительность, гибкость, умение находиться в двух мирах (сознание и бессознательное).",
                leadShadow: "Жертвенность, пассивность, ожидание «спасителя», депрессивные состояния.",
                sleepShadow: "Отрицание своей уязвимости, гиперконтроль, запрет на слабость и слёзы.",
                sleepPlus: "Доступ к глубоким эмоциям, способность просить помощь.",
                recommendation: "Разрешите себе побыть слабой и попросите помощи в простом деле. Это разбудит Персефону."
            },
            { 
                id: 'artemis', order: 7, name: 'Артемида', 
                questions: [
                    "Меня пугает или раздражает, когда кто-то пытается мной управлять или ограничивать свободу.", 
                    "Я лучше справлюсь одна, чем буду просить помощи или подчиняться группе.",
                    "Я всегда готова встать на защиту справедливости или заступиться за тех, кого обижают."
                ], 
                leadPlus: "Независимость, смелость, защита себя и слабых, верность своим принципам.",
                leadShadow: "Эмоциональная недоступность, одиночество как броня, сложность в близости.",
                sleepShadow: "Зависимость от чужого мнения, неумение сказать «нет», страх самостоятельности.",
                sleepPlus: "Обретение внутренней свободы, способность отстаивать границы.",
                recommendation: "Сделайте что-то в одиночку ради собственного удовольствия и скажите «нет» тому, что вам не подходит. Это разбудит Артемиду."
            }
        ];

        const allQuestions = archetypesData.flatMap((arch) => 
            arch.questions.map((q, idx) => ({ 
                text: q, 
                archetypeId: arch.id, 
                archetypeName: arch.name, 
                isFirstQuestion: idx === 0 
            }))
        );

        const answerOptions = [
            { label: "100% про меня", value: 3 },
            { label: "Скорее про меня", value: 2 },
            { label: "Бывает", value: 1 },
            { label: "Совсем не про меня", value: 0 }
        ];

        function App() {
            // Экраны: intro -> quiz -> radar -> details -> action
            const [screen, setScreen] = useState('intro'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [animateState, setAnimateState] = useState('in');
            const [calculatedResults, setCalculatedResults] = useState(null);

            useEffect(() => {
                try {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.ready();
                        window.Telegram.WebApp.expand();
                        window.Telegram.WebApp.setHeaderColor('#FDFBF7');
                    }
                } catch(e) {}
            }, []);

            const navigateTo = (nextScreen) => {
                setAnimateState('out');
                setTimeout(() => {
                    setScreen(nextScreen);
                    window.scrollTo(0, 0);
                    setAnimateState('in');
                }, 400);
            };

            const handleAnswer = (value) => {
                setAnimateState('out');
                setTimeout(() => {
                    const newAnswers = [...answers, value];
                    setAnswers(newAnswers);
                    
                    if (newAnswers.length >= allQuestions.length) {
                        processResults(newAnswers);
                        setScreen('radar');
                    } else {
                        setCurrentQIndex(currentQIndex + 1);
                    }
                    setAnimateState('in');
                }, 400);
            };

            const handleRestart = () => {
                setAnimateState('out');
                setTimeout(() => {
                    setAnswers([]);
                    setCurrentQIndex(0);
                    setCalculatedResults(null);
                    setScreen('intro');
                    setAnimateState('in');
                }, 400);
            };

            const processResults = (finalAnswers) => {
                const scores = archetypesData.map(arch => {
                    let total = 0;
                    let score1 = 0;
                    
                    allQuestions.forEach((q, index) => {
                        if (q.archetypeId === arch.id) {
                            const val = finalAnswers[index] || 0;
                            total += val;
                            if (q.isFirstQuestion) {
                                score1 = val;
                            }
                        }
                    });
                    
                    return { ...arch, total, score1 };
                });

                const leadingSorted = [...scores].sort((a, b) => {
                    if (b.total !== a.total) return b.total - a.total;
                    if (b.score1 !== a.score1) return b.score1 - a.score1;
                    return a.order - b.order;
                });

                const sleepingSorted = [...scores].sort((a, b) => {
                    if (a.total !== b.total) return a.total - b.total;
                    if (a.score1 !== b.score1) return a.score1 - b.score1;
                    return a.order - b.order;
                });

                setCalculatedResults({
                    allScores: scores,
                    leading: leadingSorted[0],
                    sleeping: sleepingSorted[0]
                });
            };

            const renderIntro = () => (
                <div className={`flex flex-col items-center justify-center min-h-screen p-6 text-center transition-opacity duration-500 ${animateState === 'in' ? 'opacity-100' : 'opacity-0'}`}>
                    <div className="bg-white/40 backdrop-blur-md p-8 rounded-3xl border border-white/50 shadow-xl w-full max-w-sm mx-auto mt-8">
                        <h1 className="text-4xl font-serif text-slate-900 mb-6 leading-tight">
                            7 греческих богинь <br/>
                            <span className="text-[#6A4C93] italic text-2xl mt-2 block">ведущий и спящий архетипы</span>
                        </h1>
                        <p className="text-slate-700 mb-10 text-lg leading-relaxed font-sans font-medium">
                            Узнайте, какая богиня управляет вашими решениями, а какая ждет пробуждения.
                        </p>
                        <button 
                            onClick={() => navigateTo('quiz')}
                            className="w-full bg-gradient-to-r from-[#D4AF37] to-[#C59B27] text-white py-5 rounded-2xl font-sans font-medium text-lg tracking-wide shadow-xl shadow-amber-600/20 active:scale-95 transition-all flex items-center justify-center gap-3"
                        >
                            Начать тест <ArrowRight className="w-6 h-6" />
                        </button>
                    </div>
                </div>
            );

            const renderQuiz = () => {
                const question = allQuestions[currentQIndex];
                const progress = ((currentQIndex) / allQuestions.length) * 100;

                return (
                    <div className={`flex flex-col min-h-screen p-6 max-w-md mx-auto relative transition-opacity duration-500 ${animateState === 'in' ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="w-full h-1.5 bg-white/50 rounded-full mt-4 mb-8 overflow-hidden backdrop-blur-sm">
                            <div className="h-full bg-gradient-to-r from-[#D4AF37] to-[#8A6EAB] transition-all duration-500 ease-out" style={{ width: `${progress}%` }} />
                        </div>

                        <div className="bg-white/70 backdrop-blur-md p-6 rounded-3xl border border-white/50 shadow-lg flex-1 flex flex-col justify-center mb-6">
                            <div className="mb-6 text-[#6A4C93] text-sm font-sans font-bold tracking-widest uppercase flex items-center gap-2">
                                <ShieldAlert className="w-5 h-5" />
                                Вопрос {currentQIndex + 1} из {allQuestions.length}
                            </div>
                            <h2 className="text-3xl font-serif text-slate-900 mb-10 leading-snug">
                                {question.text}
                            </h2>
                            <div className="space-y-3 mt-auto">
                                {answerOptions.map((option, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => handleAnswer(option.value)} 
                                        className="w-full bg-white/90 border border-white/60 text-slate-800 py-4 rounded-2xl font-sans font-medium text-base shadow-sm active:bg-white active:border-[#D4AF37] transition-all flex justify-between items-center px-6 group backdrop-blur-sm hover:bg-white"
                                    >
                                        <span>{option.label}</span>
                                        <Circle className="w-5 h-5 text-slate-300 group-active:text-[#D4AF37]" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderRadar = () => {
                if (!calculatedResults) return null;
                const { allScores } = calculatedResults;

                const maxScore = 9;
                const cx = 250;
                const cy = 175;
                const r = 105;
                const totalAxes = 7;

                const getCoords = (val, i) => {
                    const angle = (Math.PI * 2 * i) / totalAxes - Math.PI / 2;
                    const dist = (val / maxScore) * r;
                    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
                };

                const axes = allScores.map((_, i) => {
                    const angle = (Math.PI * 2 * i) / totalAxes - Math.PI / 2;
                    return {
                        x2: cx + r * Math.cos(angle),
                        y2: cy + r * Math.sin(angle),
                        labelX: cx + (r + 30) * Math.cos(angle),
                        labelY: cy + (r + 30) * Math.sin(angle),
                        anchor: Math.cos(angle) > 0.1 ? 'start' : Math.cos(angle) < -0.1 ? 'end' : 'middle'
                    };
                });

                const dataPointsCoords = allScores.map((score, i) => getCoords(score.total, i));
                const dataPointsString = dataPointsCoords.map(p => `${p.x},${p.y}`).join(' ');

                const webGrids = [3, 6, 9].map(val => 
                    allScores.map((_, i) => {
                        const p = getCoords(val, i);
                        return `${p.x},${p.y}`;
                    }).join(' ')
                );

                return (
                    <div className={`flex flex-col min-h-screen max-w-md mx-auto p-6 transition-opacity duration-700 ${animateState === 'in' ? 'opacity-100' : 'opacity-0'}`}>
                        
                        <div className="text-center mt-6 mb-6 bg-white/40 backdrop-blur-md py-4 px-6 rounded-3xl border border-white/50 shadow-sm">
                            <h2 className="text-4xl font-serif text-slate-900 mb-2">Ваши архетипы</h2>
                            <p className="text-lg text-slate-700 font-sans font-medium">Результаты анализа</p>
                        </div>

                        <div className="bg-white/90 backdrop-blur-md rounded-3xl p-4 border border-white/50 shadow-lg flex flex-col items-center flex-1 justify-center mb-6">
                            <h3 className="font-serif text-2xl text-slate-900 mb-2 w-full text-center">Колесо архетипов</h3>
                            
                            <svg viewBox="0 0 500 350" className="w-full h-auto drop-shadow-xl overflow-visible mt-2">
                                {webGrids.map((points, idx) => (
                                    <polygon key={`grid-${idx}`} points={points} fill="none" stroke="#EAE1D8" strokeWidth="1" />
                                ))}
                                {axes.map((axis, idx) => (
                                    <line key={`axis-${idx}`} x1={cx} y1={cy} x2={axis.x2} y2={axis.y2} stroke="#EAE1D8" strokeWidth="1" />
                                ))}
                                <polygon points={dataPointsString} fill="rgba(106, 76, 147, 0.25)" stroke="#6A4C93" strokeWidth="2" strokeLinejoin="round" />
                                {dataPointsCoords.map((p, i) => (
                                    <circle key={`point-${i}`} cx={p.x} cy={p.y} r="5" fill="#D4AF37" />
                                ))}
                                {axes.map((axis, idx) => (
                                    <text 
                                        key={`label-${idx}`} 
                                        x={axis.labelX} 
                                        y={axis.labelY} 
                                        textAnchor={axis.anchor} 
                                        dominantBaseline="middle" 
                                        fill="#475569" 
                                        className="font-sans text-[14px] font-semibold tracking-wide"
                                    >
                                        {allScores[idx].name} ({allScores[idx].total})
                                    </text>
                                ))}
                            </svg>
                        </div>

                        <div className="mt-auto pb-4 pt-4 sticky bottom-0">
                            <button onClick={() => navigateTo('details')} className="w-full bg-white/90 backdrop-blur-md border border-white text-[#6A4C93] py-5 rounded-2xl font-sans font-semibold text-lg shadow-xl active:bg-white transition-all flex items-center justify-center gap-2 hover:bg-white">
                                Узнать свой ведущий и спящий архетип <ArrowRight className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                );
            };

            const renderDetails = () => {
                if (!calculatedResults) return null;
                const { leading, sleeping } = calculatedResults;

                return (
                    <div className={`flex flex-col min-h-screen max-w-md mx-auto p-6 transition-opacity duration-700 ${animateState === 'in' ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="text-center mt-6 mb-6 bg-white/40 backdrop-blur-md py-4 px-6 rounded-3xl border border-white/50 shadow-sm">
                            <h2 className="text-4xl font-serif text-slate-900 mb-2">Подробный разбор</h2>
                            <p className="text-lg text-slate-700 font-sans font-medium">Что означают ваши баллы</p>
                        </div>
                        
                        <div className="flex-1 space-y-6 mb-10 pb-6">
                            
                            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-6 border border-white/50 shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-[#D4AF37]"></div>
                                <div className="flex items-center gap-2 mb-3">
                                    <Star className="w-6 h-6 text-[#D4AF37]" />
                                    <h3 className="font-serif text-2xl text-slate-900">Ведущий архетип {leading.name}</h3>
                                </div>
                                <p className="text-sm text-[#D4AF37] font-bold tracking-widest uppercase mb-4">{leading.total} из 9 баллов</p>
                                
                                <p className="text-base text-slate-700 font-sans font-medium leading-relaxed mb-3">
                                    <span className="font-bold text-slate-900">Светлая сторона.</span> {leading.leadPlus}
                                </p>
                                <p className="text-base text-slate-700 font-sans font-medium leading-relaxed">
                                    <span className="font-bold text-slate-900">Теневая сторона.</span> {leading.leadShadow}
                                </p>
                            </div>

                            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-6 border border-white/50 shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-[#6A4C93]"></div>
                                <div className="flex items-center gap-2 mb-3">
                                    <Moon className="w-6 h-6 text-[#6A4C93]" />
                                    <h3 className="font-serif text-2xl text-slate-900">Спящий архетип {sleeping.name}</h3>
                                </div>
                                <p className="text-sm text-[#6A4C93] font-bold tracking-widest uppercase mb-4">{sleeping.total} из 9 баллов</p>
                                
                                <p className="text-base text-slate-700 font-sans font-medium leading-relaxed mb-3">
                                    <span className="font-bold text-slate-900">Что скрывает тень.</span> {sleeping.sleepShadow}
                                </p>
                                <p className="text-base text-slate-700 font-sans font-medium leading-relaxed mb-4">
                                    <span className="font-bold text-slate-900">Что даст пробуждение.</span> {sleeping.sleepPlus}
                                </p>
                                <div className="bg-purple-50/50 p-4 rounded-2xl border border-purple-100">
                                    <p className="text-sm text-slate-800 font-sans font-medium leading-relaxed italic">
                                        <span className="font-bold not-italic">Рекомендация.</span> {sleeping.recommendation}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-auto pb-4 pt-4 sticky bottom-0">
                            <button onClick={() => navigateTo('action')} className="w-full bg-gradient-to-r from-[#6A4C93] to-[#8A6EAB] text-white py-5 rounded-2xl font-sans font-medium text-lg tracking-wide shadow-xl shadow-purple-900/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                                Что дальше? <ArrowRight className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                );
            };

            const renderAction = () => (
                <div className={`flex flex-col items-center justify-center min-h-screen p-6 text-center transition-opacity duration-700 ${animateState === 'in' ? 'opacity-100' : 'opacity-0'}`}>
                    <div className="bg-white/60 backdrop-blur-md p-8 rounded-3xl border border-white/50 shadow-xl w-full max-w-sm mx-auto flex flex-col items-center">
                        <h2 className="text-3xl font-serif text-slate-900 mb-6 leading-snug">
                            Тест показал, какой архетип у тебя проявлен, а какой <span className="text-[#6A4C93] italic">в тени.</span>
                        </h2>
                        <p className="text-lg text-slate-800 mb-10 font-sans font-medium leading-relaxed max-w-sm">
                            Хочешь узнать, как это влияет на деньги, отношения и реализацию? <br/><br/>
                            <span className="font-bold text-slate-900">Записывайся на консультацию.</span>
                        </p>
                        
                        <div className="w-full space-y-4 max-w-sm mt-auto">
                            <a href="https://t.me/Annagvozdi" target="_blank" rel="noreferrer" className="w-full bg-gradient-to-r from-[#D4AF37] to-[#C59B27] text-white py-5 px-3 rounded-2xl font-sans font-medium text-base tracking-wide shadow-xl shadow-amber-600/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                                <MessageCircle className="w-5 h-5 flex-shrink-0" /> 
                                <span>Хочу на консультацию по архетипам</span>
                            </a>
                            
                            <div className="pt-4 pb-1">
                                <p className="text-sm text-slate-800 mb-3 font-sans font-medium leading-relaxed text-center">
                                    И подписывайся на канал, там больше полезной информации 👇
                                </p>
                                <a href="https://t.me/Annapeaceinthesoul" target="_blank" rel="noreferrer" className="w-full bg-white/90 border border-white text-[#6A4C93] py-5 rounded-2xl font-sans font-semibold text-lg shadow-sm active:bg-white transition-all flex items-center justify-center gap-3 hover:bg-white">
                                    Подписаться на канал
                                </a>
                            </div>

                            <button onClick={handleRestart} className="w-full bg-white/30 border border-white/40 text-slate-700 py-4 font-sans font-medium text-base mt-2 flex items-center justify-center gap-2 hover:bg-white/50 transition-colors rounded-2xl backdrop-blur-sm">
                                <RotateCcw className="w-5 h-5" /> Пройти тест заново
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="w-full max-w-md mx-auto relative min-h-screen overflow-x-hidden">
                    {screen === 'intro' && renderIntro()}
                    {screen === 'quiz' && renderQuiz()}
                    {screen === 'radar' && renderRadar()}
                    {screen === 'details' && renderDetails()}
                    {screen === 'action' && renderAction()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
